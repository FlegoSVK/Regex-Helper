    <title>Universal - Translator Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cyber: {
                900: '#050505', // Very dark background
                800: '#111111', // Card background
                700: '#222222', // Borders
                600: '#333333', // Lighter borders/hover
                accent: '#00F0FF', // Neon Cyan
                accentHover: '#5CFFFF', // Lighter Cyan
                success: '#39FF14', // Neon Green
                warning: '#FFE600', // Neon Yellow
                text: '#E0E0E0', // Main text
                muted: '#888888' // Muted text
              }
            },
            boxShadow: {
              'neon-cyan': '0 0 10px rgba(0, 240, 255, 0.5), 0 0 20px rgba(0, 240, 255, 0.3)',
              'neon-green': '0 0 10px rgba(57, 255, 20, 0.5), 0 0 20px rgba(57, 255, 20, 0.3)',
              'neon-yellow': '0 0 10px rgba(255, 230, 0, 0.5), 0 0 20px rgba(255, 230, 0, 0.3)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #050505;
        color: #E0E0E0;
      }
      /* Custom Scrollbar for code blocks */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #111111; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00F0FF; 
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
      }
    </style>
